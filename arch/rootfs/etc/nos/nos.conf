# NeuralOS Configuration
# /etc/nos/nos.conf

# Login settings
AUTO_LOGIN=true
DEFAULT_USER=user

# Node identity
NODE_ID=primary

# AI settings
CONTEXT_MODE=auto
PREFETCH_ENABLED=true

# Memory compression
HOT_LIMIT_MB=512
WARM_LIMIT_MB=1024

# Cache settings
CACHE_MAX_MB=256
PREFETCH_ENABLED=true

# Anomaly detection
ANOMALY_THRESHOLD=3.0
ANOMALY_HISTORY=200

# Resource prediction
PREDICTOR_WINDOW=30
PREDICTOR_HORIZON=5

# Federated learning
FEDERATED_ENABLED=false
FEDERATED_SYNC_INTERVAL=300

# GUI settings
GUI_ENABLED=false

# Agent settings
AGENT_ENABLED=false
AGENT_MAX_STEPS=20

# Package manager
PKG_BACKEND=internal
PKG_HEALTH_THRESHOLD=50

# Logging
LOG_LEVEL=INFO
LOG_DIR=/var/log/nos
